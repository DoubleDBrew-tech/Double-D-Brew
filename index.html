// KG PARSING UTIL
function parseKgInput(input) {
  if (!input || input.toString().trim() === "") return { kg_value: null, kg_display: "" };
  let s = input.toString().trim().toLowerCase();
  s = s.replace(/\s+/g, '');
  let kg_value = null;
  if (s.endsWith('g') && !s.endsWith('kg')) {
    let num = parseFloat(s.replace(/g$/, ''));
    if (!isNaN(num)) kg_value = num / 1000;
  } else if (s.endsWith('kg')) {
    let num = parseFloat(s.replace(/kg$/, ''));
    if (!isNaN(num)) kg_value = num;
  } else {
    const num = parseFloat(s);
    if (!isNaN(num)) {
      if (num >= 100) {
        kg_value = num / 1000;
        s = s + 'g';
      } else {
        kg_value = num;
      }
    }
  }
  let kg_display = "";
  if (kg_value === null) {
    kg_display = input.toString();
  } else {
    if (kg_value < 1) {
      const grams = Math.round(kg_value * 1000);
      kg_display = `${grams} g`;
    } else {
      kg_display = `${+kg_value.toFixed(3)} kg`;
    }
  }
  return { kg_value, kg_display };
}

// LOAD PRO
// Function to clear filters and show all products
async function loadProducts() {
  try {
    // 1. Fetch from Firestore (Ordering by newest first)
    // IMPORTANT: If this fails, it's usually because you need to click the link in the 
    // Console (F12) to create a Firestore Index.
    const q = query(collection(db, "products"), orderBy("created_at", "desc"));
    const querySnapshot = await getDocs(q);
    
    products = []; 
    querySnapshot.forEach((docu) => {
      products.push({ id: docu.id, ...docu.data() });
    });

    console.log("Successfully loaded " + products.length + " products.");

    // 2. Trigger UI Update
    // We call showDashboard because it handles both the Stats cards 
    // and calls renderTable internally.
    if (typeof showDashboard === "function") {
      showDashboard(); 
    } else if (typeof renderTable === "function") {
      renderTable(products);
    }

  } catch (error) {
    console.error("Firestore OrderBy Error (Index probably missing):", error);
    
    // FALLBACK: Load without sorting so the user still sees their data
    const querySnapshot = await getDocs(collection(db, "products"));
    products = [];
    querySnapshot.forEach((docu) => {
      products.push({ id: docu.id, ...docu.data() });
    });
    
    if (typeof showDashboard === "function") showDashboard();
  }
}

async function saveNewProduct(e) {
  e.preventDefault();
  const form = e.target;
  const category = form.category.value;
  const price = parseFloat(form.price.value);
  const newSku = form.sku.value.trim();

  // 🛡️ SKU VALIDATION: Prevent manual batch suffixes
  if (newSku.endsWith("-N") || newSku.endsWith("-P")) {
    alert("❌ SKU Error: Please do not end the SKU with '-N' or '-P'. These are reserved for the batching system.");
    return;
  }

  // 🛡️ SKU VALIDATION: Prevent Duplicate SKUs
  const skuExists = products.some(p => p.sku.toLowerCase() === newSku.toLowerCase());
  if (skuExists) {
    alert(`❌ SKU Error: The SKU "${newSku}" is already assigned to another product.`);
    return;
  }

  let finalStock = 0;
  let finalQuantity = 0;
  let finalUnit = "";
  let expiryDate = "N/A";

  if (category === "utensil") {
    const piecesInput = parseFloat(form.pieces.value) || 0;
    finalStock = piecesInput / 100; 
    finalQuantity = piecesInput; 
    finalUnit = "pcs";
    expiryDate = "N/A";
  } else {
    const qtyInput = parseFloat(form.quantity.value) || 0;
    const unitInput = form.unit.value;
    finalStock = unitInput === "g" ? qtyInput / 1000 : qtyInput;
    finalQuantity = qtyInput;
    finalUnit = unitInput;

    // 🔥 Use the custom date picked by the user
    expiryDate = form.expiryDate.value || "N/A";
  }

  try {
    await addDoc(collection(db, "products"), {
      sku: newSku,
      name: form.name.value,
      description: form.description.value,
      category: category,
      quantity: finalQuantity,
      unit: finalUnit,
      quantity_value: finalStock, 
      stock: finalStock,
      price: price,
      expiry: expiryDate,
      created_at: serverTimestamp()
    });

    alert("✅ New product added!");
    showDashboard();
    loadProducts();
  } catch (error) {
    console.error("Error adding product:", error);
    alert("❌ Failed to save product to database.");
  }
}

async function updateProduct(e) {
  e.preventDefault();
  const form = e.target;
  const productId = form.elements['id'].value; 
  const newSku = form.sku.value.trim();
  
  const originalProduct = products.find(x => x.id === productId);
  if (!originalProduct) return alert("❌ Error: Product not found.");

  // 🛡️ SKU VALIDATION
  if (newSku.endsWith("-N") || newSku.endsWith("-P")) {
    alert("❌ SKU Error: Please do not end the SKU with '-N' or '-P'. These are reserved for batches.");
    return;
  }

  const isDuplicate = products.some(p => p.sku.toLowerCase() === newSku.toLowerCase() && p.id !== productId);
  if (isDuplicate) {
    alert(`❌ SKU Error: The SKU "${newSku}" is already used by another product.`);
    return;
  }

  let category = form.category.value;
  let price = parseFloat(form.price.value);
  
  let finalStock = 0;
  let finalQuantity = 0;
  let finalUnit = "";
  let expiryDate = originalProduct.expiry || "N/A";

  if (category === "utensil") {
    let piecesInput = parseFloat(form.pieces.value) || 0;
    finalStock = piecesInput / 100;
    finalQuantity = piecesInput;
    finalUnit = "pcs";
    expiryDate = "N/A";
  } else {
    let qtyInput = parseFloat(form.quantity.value) || 0;
    let unit = form.unit.value;
    
    finalStock = (unit === "g") ? qtyInput / 1000 : qtyInput;
    
    // Auto-formatting logic
    if (unit === "g" && qtyInput >= 1000) {
      finalQuantity = qtyInput / 1000; finalUnit = "kg";

    // 🔥 NEW EXPIRY LOGIC: Take value from date picker
    const customDate = form.customExpiry.value;
    if (customDate) {
      expiryDate = customDate;
    }
  }

  try {

    await updateDoc(ref, {
      sku: newSku,
      name: form.name.value,
      description: form.description.value,
      category: category,
      quantity: finalQuantity,
      unit: finalUnit,
      quantity_value: finalStock,
      stock: finalStock,

      expiry: expiryDate 
    });

    showDashboard();
    loadProducts();
  } catch (error) {
    console.error("Update failed:", error);
    alert("❌ Failed to update database.");

}

// Adjust
window.applyAdjust = async function (id, value, isCustom = false) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  const isUtensil = p.category.toLowerCase() === "utensil";
  let adjustAmount = parseFloat(value);
  if (isNaN(adjustAmount)) return alert("❌ Invalid value!");

  try {
    if (isUtensil) {
      // --- UTENSIL LOGIC (Pieces) ---
      // We multiply by 100 because utensils are stored as 0.01 per piece in your stock
      const currentPieces = Math.round((p.stock || 0) * 100);
      const newPieces = currentPieces + adjustAmount;
      if (newPieces < 0) return alert(`❌ Insufficient pieces. You only have ${currentPieces} left.`);
      
      const newStock = newPieces / 100;

      await updateDoc(doc(db, "products", id), {
        stock: newStock,
        quantity_value: newStock,
        quantity: newPieces,
        unit: "pcs"
      });
      alert(`✅ Updated: ${newPieces} pieces total.`);

    } else {
      // --- INGREDIENT LOGIC (Batching) ---
      let adjustKg = isCustom ? adjustAmount / 1000 : adjustAmount;
      const currentStock = parseFloat(p.stock || 0);
      const newStock = parseFloat((currentStock + adjustKg).toFixed(3));

      if (newStock < 0) return alert("❌ Insufficient stock.");

      // 🔥 CASE A: ADDING STOCK (Restocking creates a NEW batch)
      if (adjustKg > 0) {
        const today = new Date().toISOString().split('T')[0];
        const newExpiryDate = prompt(`New batch for ${p.name}.\nEnter Expiry Date (YYYY-MM-DD):`, today);
        if (!newExpiryDate) return;

        const cleanName = p.name.replace(" (New)", "").replace(" (Previous)", "");
        const baseSKU = p.sku.replace("-N", "").replace("-P", "");

        // 1. Rename current product to "Previous"
        await updateDoc(doc(db, "products", id), { 
            name: cleanName + " (Previous)", 
            sku: baseSKU + "-P" 
        });

        // 2. Create the "New" batch
        await addDoc(collection(db, "products"), {
          sku: baseSKU + "-N",
          name: cleanName + " (New)",
          description: p.description || "",
          category: p.category,
          price: p.price,
          stock: adjustKg,
          quantity_value: adjustKg,
          quantity: adjustKg < 1 ? Math.round(adjustKg * 1000) : adjustKg,
          unit: adjustKg < 1 ? "g" : "kg",
          expiry: newExpiryDate,
          created_at: serverTimestamp()
        });
        alert(`✅ Restocked: Current batch moved to 'Previous', new batch created as 'New'.`);

      } 
      // 🔥 CASE B: DEDUCTING STOCK (Usage)
      else {
        // If the Previous batch hits 0, delete it and promote the New batch
        if (newStock === 0 && p.sku.endsWith("-P")) {
          const baseSKU = p.sku.replace("-P", "");
          
          await deleteDoc(doc(db, "products", id));

          // Look for the batch waiting in line
          const newBatch = products.find(x => x.sku === baseSKU + "-N");
          if (newBatch) {
            await updateDoc(doc(db, "products", newBatch.id), {
              name: newBatch.name.replace(" (New)", ""),
              sku: baseSKU
            });
            alert("✅ Previous batch finished! New batch promoted to Main.");
          } else {
            alert("✅ Previous batch depleted and removed.");
          }
        } else {
          // Standard stock deduction
          await updateDoc(doc(db, "products", id), {
            stock: newStock,
            quantity_value: newStock,
            quantity: newStock < 1 ? Math.round(newStock * 1000) : newStock,
            unit: newStock < 1 ? "g" : "kg"
          });
          alert("✅ Stock deducted.");
        }
      }
    }

    // 📝 Record Transaction for history
    await addDoc(collection(db, "transactions"), {
      productId: id,
      productName: p.name,
      change: adjustAmount,
      type: adjustAmount > 0 ? "Restock" : "Usage",
      timestamp: serverTimestamp()
    });

    loadProducts(); // Refresh the table
  } catch (error) {
    console.error("Adjustment failed:", error);
    alert("❌ Error: " + error.message);
  }
};

// Render Tabler
function renderTable(list) {
  const tbody = document.getElementById("productTableBody");
  if (!tbody) return;

  const now = new Date();
  now.setHours(0, 0, 0, 0);

  tbody.innerHTML = list.map(p => {
    // 1. Calculations & Type Safety
    const price = (typeof p.price === 'number') ? p.price : 0;
    const stock = (typeof p.stock === 'number') ? p.stock : 0;
    const isUtensils = (p.category.toLowerCase() === "utensil");
    
    // Utensils: 1 stock = 100 pieces. 
    const pieces = isUtensils ? Math.round(stock * 100) : 0;
    const totalValue = isUtensils ? (price * pieces) : (price * stock);

    const quantityDisplay = isUtensils ? "—" : (p.quantity ? `${p.quantity} ${p.unit}` : "—");

    // 2. Expiry & Countdown Logic
    let expiryHTML = '—';
    if (!isUtensils && p.expiry && p.expiry !== "N/A") {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expDate = new Date(p.expiry);
      expDate.setHours(0, 0, 0, 0);

      const diffTime = expDate.getTime() - today.getTime();
      const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

      let badgeClass = "bg-info text-dark"; 
      let countdownText = `${diffDays} days left`;

      if (diffDays < 0) {
        badgeClass = "bg-danger";
        countdownText = "EXPIRED";
      } else if (diffDays === 0) {
        badgeClass = "bg-danger";
        countdownText = "EXPIRES TODAY";
      } else if (diffDays <= 7) {
        badgeClass = "bg-warning text-dark";
        countdownText = "Expiring Soon!";
      }

      expiryHTML = `
        <span class="badge ${badgeClass}">${p.expiry}</span>
        <div style="font-size: 0.75rem; margin-top: 2px;" class="fw-bold text-uppercase">
          ${countdownText}
        </div>

/**
 * 1. REAL-TIME CHART (Weekly/Monthly/Yearly)
 */
function startRealtimeChart(range) {
  const now = new Date();
  let startDate = new Date();

  if (range === "weekly") {
    // Look back 4 weeks
    startDate.setDate(now.getDate() - 28);
  } else if (range === "monthly") {
    // Start from beginning of current year to show all months
    startDate.setMonth(0, 1);
  } else if (range === "yearly") {
    // Look back 5 years
    startDate.setFullYear(now.getFullYear() - 5);
  }
  startDate.setHours(0, 0, 0, 0);

  const q = query(
    collection(db, "transactions"),
    where("timestamp", ">=", startDate)
  );

  const unsubscribe = onSnapshot(q, snapshot => {
    let groupedData = {};

    snapshot.forEach(doc => {
      const data = doc.data();
      const date = data.timestamp?.toDate();
      if (!date) return;

      let key = "";
      
      if (range === "weekly") {
        // Formats as "Week of [Date]"
        const startOfWeek = new Date(date);
        startOfWeek.setDate(date.getDate() - date.getDay());
        key = "Week " + startOfWeek.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      } 
      else if (range === "monthly") {
        // Formats as "January", "February", etc.
        key = date.toLocaleDateString("en-US", { month: "long" });
      } 
      else if (range === "yearly") {
        // Formats as "2025", "2026", etc.
        key = date.getFullYear().toString();
      }

      if (!groupedData[key]) groupedData[key] = 0;
      groupedData[key] += Math.abs(Number(data.change)) || 0;
    });

    // Sort keys logically (optional but recommended for years/months)
    const sortedLabels = Object.keys(groupedData);
    const sortedValues = sortedLabels.map(label => groupedData[label]);

    renderChart(sortedLabels, sortedValues, range.toUpperCase() + " MOVEMENT");
  });

  activeListeners.push(unsubscribe);
}

/**
 * 2. PRODUCT MOVEMENT (TOTAL)
 */
function loadProductMovement() {
  const q = query(collection(db, "transactions"));

  const unsubscribe = onSnapshot(q, snapshot => {
    let grouped = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (!grouped[d.productName]) grouped[d.productName] = 0;
      grouped[d.productName] += Number(d.change) || 0;
    });

    renderChart(Object.keys(grouped), Object.values(grouped), "Product Movement");
  });

  activeListeners.push(unsubscribe);
}

/**
 * 3. REVENUE & STAT CARDS
 */
function loadRevenueAnalytics() {
  const q = query(collection(db, "transactions"));

  const unsubscribe = onSnapshot(q, snapshot => {
    let sales = 0;           // Total value of stock used/sold (negative change)
    let purchases = 0;       // Total value of stock bought (positive change)
    let totalMovement = 0;
    let productTotals = {};

    snapshot.forEach(doc => {
      const d = doc.data();
      const changeVal = Number(d.change) || 0;
      const totalVal = Number(d.totalValue) || 0;

      // Logic for Sales vs. Purchases
      if (changeVal < 0) {
        // Stock going OUT (Usage/Sales)
        sales += Math.abs(totalVal);
      } else if (changeVal > 0) {
        // Stock coming IN (Bought/Restocked)
        purchases += Math.abs(totalVal);
      }

      // Movement: Total absolute volume of activity
      totalMovement += Math.abs(changeVal);

      // Tracking Top Product by total activity
      if (d.productName) {
        productTotals[d.productName] = (productTotals[d.productName] || 0) + Math.abs(changeVal);
      }
    });

    // Update UI Elements
    // Note: Make sure you have an element with id="expenseCard" in your HTML
    document.getElementById("revenueCard").innerText = "₱" + sales.toLocaleString(undefined, { minimumFractionDigits: 2 });
    
    const expenseEl = document.getElementById("expenseCard");
    if (expenseEl) {
      expenseEl.innerText = "₱" + purchases.toLocaleString(undefined, { minimumFractionDigits: 2 });
    }

    document.getElementById("movementCard").innerText = totalMovement.toFixed(2) + " KG";

    const productKeys = Object.keys(productTotals);
    const top = productKeys.sort((a, b) => productTotals[b] - productTotals[a])[0];
    document.getElementById("topProductCard").innerText = top || "-";
  });

  activeListeners.push(unsubscribe);
}

// LOW STOCK
window.showLowStock = function () {
  const lowStock = products.filter(p => (p.stock || 0) <= 3);
  if (lowStock.length === 0) {
    alert("✅ All stocks are sufficient!");
    return;
  }

  let rows = lowStock.map(p => `
    <tr>
      <td>${p.sku ?? ''}</td>
      <td>${p.name ?? ''}</td>
      <td class="${stockColor(p.stock ?? 0)} text-center">${p.stock ?? 0}</td>
      <td>₱${(p.price ?? 0).toFixed(2)}</td>
      <td>${p.kg ?? (p.kg_value ? (p.kg_value < 1 ? `${Math.round(p.kg_value*1000)} g` : `${+p.kg_value.toFixed(3)} kg`) : '')}</td>
      <td>₱${(((p.price || 0) * (p.stock || 0))).toFixed(2)}</td>
    </tr>
  `).join("");

  document.getElementById("main").innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>⚠️ Low Stock Products</h4>
      <div>
        <button class="btn btn-secondary me-2" onclick="showDashboard()">⬅️ Back</button>
        <button class="btn btn-primary" onclick="exportXLSX()">⬇️ Export XLSX</button>
      </div>
    </div>

    <table class="table table-striped align-middle">
      <thead class="table-danger">
        <tr><th>SKU</th><th>Name</th><th>Stock</th><th>Price</th><th>KG</th><th>Total Value</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
};

// Export XLSX
window.exportXLSX = function () {

    let previousData = JSON.parse(localStorage.getItem("previous_inventory") || "{}");

    let sheetData = [
        [
            "SKU", "Name", "Description", "Category", "Quantity", "Unit", "Quantity_Value",
            "Price", "Old Stock", "New Stock", "Stock Change", "Total Value", "Pieces"
        ]
    ];

    products.forEach(p => {

        let newStock = Number(p.stock);
        let oldStock = previousData[p.sku]?.stock;

        let changeText = "— NEW ITEM";
        let diffValue = 0;

        if (typeof oldStock === "number") {
            diffValue = newStock - oldStock;

            if (diffValue > 0) {
                changeText = `+${diffValue} ↑ INCREASE`;
            } else if (diffValue < 0) {
                changeText = `${diffValue} ↓ DECREASE`;
            } else {
                changeText = `0 — NO CHANGE`;
            }
        }

        const pieces =
            p.category?.toLowerCase() === "utensil"
                ? newStock * 100
                : "";

        let totalValue = newStock * Number(p.price || 0);

        sheetData.push([
            p.sku,
            p.name,
            p.description,
            p.category,
            p.quantity || "",
            p.unit || "",
            p.quantity_value || "",
            p.price || 0,
            typeof oldStock === "number" ? oldStock : "",
            newStock,
            changeText, // ⭐ CLEAR INDICATOR
            totalValue,
            pieces
        ]);
    });

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(sheetData);

    XLSX.utils.book_append_sheet(wb, ws, "Inventory");

    const today = new Date().toISOString().split("T")[0];
    XLSX.writeFile(wb, `inventory (${today}).xlsx`);

    // Save snapshot
    let snapshot = {};
    products.forEach(p => {
        snapshot[p.sku] = { stock: Number(p.stock) };
    });
    localStorage.setItem("previous_inventory", JSON.stringify(snapshot));
};
