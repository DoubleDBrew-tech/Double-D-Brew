// KG PARSING UTIL
function parseKgInput(input) {
  if (!input || input.toString().trim() === "") return { kg_value: null, kg_display: "" };
  let s = input.toString().trim().toLowerCase();
  s = s.replace(/\s+/g, '');
  let kg_value = null;
  if (s.endsWith('g') && !s.endsWith('kg')) {
    let num = parseFloat(s.replace(/g$/, ''));
    if (!isNaN(num)) kg_value = num / 1000;
  } else if (s.endsWith('kg')) {
    let num = parseFloat(s.replace(/kg$/, ''));
    if (!isNaN(num)) kg_value = num;
  } else {
    const num = parseFloat(s);
    if (!isNaN(num)) {
      if (num >= 100) {
        kg_value = num / 1000;
        s = s + 'g';
      } else {
        kg_value = num;
      }
    }
  }
  let kg_display = "";
  if (kg_value === null) {
    kg_display = input.toString();
  } else {
    if (kg_value < 1) {
      const grams = Math.round(kg_value * 1000);
      kg_display = `${grams} g`;
    } else {
      kg_display = `${+kg_value.toFixed(3)} kg`;
    }
  }
  return { kg_value, kg_display };
}

async function saveNewProduct(e) {
  e.preventDefault();
  const form = e.target;

  let quantityInput = parseFloat(form.quantity.value);
  let unit = form.unit.value;
  let price = parseFloat(form.price.value);
  let category = form.category.value;

  // Unit conversion to KG
  let quantity_value = unit === "g" ? quantityInput / 1000 : quantityInput;
  let finalUnit = unit;
  let finalQuantity = quantityInput;

  // Automatic Expiry Logic for New Items
  let expiryDate = "N/A";
  if (category === "ingredient") {
    const shelfLife = form.shelfLife.value;
    const d = new Date();
    d.setDate(d.getDate() + parseInt(shelfLife));
    expiryDate = d.toISOString().split('T')[0];
  }

  try {
    // 🔥 Use addDoc for NEW products
    await addDoc(collection(db, "products"), {
      sku: form.sku.value,
      name: form.name.value,
      description: form.description.value,
      category: category,
      quantity: finalQuantity,
      unit: finalUnit,
      quantity_value: quantity_value,
      stock: quantity_value,
      price: price,
      expiry: expiryDate
    });

    alert("✅ New product added!");
    showDashboard(); // Return to main view
    loadProducts();  // Refresh list
  } catch (error) {
    console.error("Error adding product:", error);
    alert("❌ Failed to save product.");
  }
}

async function updateProduct(e) {
  e.preventDefault();
  const form = e.target;
  
  // 1. Correctly grab the ID from the hidden input
  const productId = form.elements['id'].value; 
  
  // 2. Safety check: Find the product in our local array
  const originalProduct = products.find(x => x.id === productId);

  if (!originalProduct) {
    console.error("Product not found for ID:", productId);
    alert("❌ Error: Could not find the product to update.");
    return;
  }

  let quantityInput = parseFloat(form.quantity.value);
  let unit = form.unit.value;
  let price = parseFloat(form.price.value);
  let category = form.category.value;

  // Unit conversion to KG
  let quantity_value = unit === "g" ? quantityInput / 1000 : quantityInput;
  let finalUnit = unit;
  let finalQuantity = quantityInput;

  if (unit === "g" && quantityInput >= 1000) {
    quantity_value = quantityInput / 1000;
    finalUnit = "kg";
    finalQuantity = quantity_value;
  } else if (unit === "kg" && quantityInput < 1) {
    finalUnit = "g";
    finalQuantity = Math.round(quantityInput * 1000);
  }

  // 3. Safe Expiry Logic
  let expiryDate = originalProduct.expiry || "N/A";
  if (category === "ingredient") {
    const shelfLife = form.shelfLife.value;
    if (shelfLife !== "keep") {
      const d = new Date();
      d.setDate(d.getDate() + parseInt(shelfLife));
      expiryDate = d.toISOString().split('T')[0];
    }
  } else {
    expiryDate = "N/A"; 
  }

  const ref = doc(db, "products", productId);

  try {
    await updateDoc(ref, {
      sku: form.sku.value,
      name: form.name.value,
      description: form.description.value,
      category: category,
      quantity: finalQuantity,
      unit: finalUnit,
      quantity_value: quantity_value,
      stock: quantity_value,
      price: price,
      expiry: expiryDate 
    });

    alert("✅ Product updated!");
    showDashboard(); // Return to dashboard
    loadProducts();  // Refresh data
  } catch (error) {
    console.error("Update failed:", error);
    alert("❌ Failed to update database.");
  }
}

// Adjust
window.applyAdjust = async function (id, value, isCustom = false) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  let adjustKg = 0;

  // 1. Calculate the adjustment amount in KG
  if (isCustom) {
    const grams = parseFloat(value);
    if (isNaN(grams)) {
      alert("Invalid grams value!");
      return;
    }
    adjustKg = grams / 1000;
  } else {
    const kg = parseFloat(value);
    if (isNaN(kg)) {
      alert("Invalid value!");
      return;
    }
    adjustKg = kg;
  }

  const currentKg = p.quantity_value || 0;
  const newKg = parseFloat((currentKg + adjustKg).toFixed(3));

  if (newKg < 0) {
    alert("❌ Quantity cannot go below 0 kg!");
    return;
  }

  // 2. EXPIRY LOGIC: If adding stock (+), ask for new expiry
  let newExpiry = p.expiry || "N/A";
  if (adjustKg > 0 && p.category === "ingredient") {
    const shelfLife = prompt(`You are adding stock to ${p.name}.\nHow many days from today will this new batch expire?`, "30");
    
    if (shelfLife !== null && shelfLife !== "") {
      const d = new Date();
      d.setDate(d.getDate() + parseInt(shelfLife));
      newExpiry = d.toISOString().split('T')[0];
    }
  }

  // 3. Determine display Unit and Quantity
  let finalUnit = "kg";
  let finalQuantity = newKg;
  if (newKg > 0 && newKg < 1) {
    finalUnit = "g";
    finalQuantity = Math.round(newKg * 1000);
  }

  const ref = doc(db, "products", id);

  try {
    // 4. Update Product (Combined into ONE call for speed)
    await updateDoc(ref, {
      quantity_value: newKg, // Using the calculated newKg for accuracy
      stock: newKg,
      quantity: finalQuantity,
      unit: finalUnit,
      expiry: newExpiry
    });

    // 5. Record Transaction for Analytics
    await addDoc(collection(db, "transactions"), {
      productId: id,
      productName: p.name,
      category: p.category,
      change: adjustKg,
      price: p.price || 0,
      totalValue: Math.abs(adjustKg * (p.price || 0)), // Ensure value is positive for revenue/expense
      timestamp: serverTimestamp()
    });

    // Success feedback
    if (adjustKg > 0) {
        alert(`✅ Stock Added! New Expiry: ${newExpiry}`);
    }

    loadProducts();
  } catch (error) {
    console.error("Adjustment failed:", error);
    alert("❌ Error updating stock.");
  }
};

// Stock Color
function stockColor(stock) {
  if ((stock || 0) <= 3) return "bg-danger text-white fw-bold";
  if ((stock || 0) <= 6) return "bg-warning fw-bold";
  return "bg-success text-white fw-bold";
}

function applyFiltersAndRender() {
  // category filter
  let list = (currentCategory === 'all') ? [...products] : products.filter(p => p.category === currentCategory);

  // search filter
  const q = (searchQuery || "").toString().trim().toLowerCase();

if (q !== "") {

    const name = (p.name ?? "").toString().toLowerCase();

    const category = (p.category ?? "").toString().toLowerCase();
    const quantityStr = `${p.quantity ?? ''} ${p.unit ?? ''}`.toLowerCase();
    const stockStr = (p.stock ?? "").toString().toLowerCase();
    const kgValueStr = (p.quantity_value ?? "").toString().toLowerCase();

    return (
      name.includes(q) ||
      sku.includes(q) ||
      category.includes(q) ||
      quantityStr.includes(q) ||
      kgValueStr.includes(q) ||
      stockStr.includes(q)
    );
  });
}

  // sorting
  if (sortMode === "az") list.sort((a, b) => (a.name ?? '').localeCompare(b.name ?? ''));
  if (sortMode === "za") list.sort((a, b) => (b.name ?? '').localeCompare(a.name ?? ''));
  if (sortMode === "stockLowHigh") list.sort((a, b) => (a.stock ?? 0) - (b.stock ?? 0));
  if (sortMode === "stockHighLow") list.sort((a, b) => (b.stock ?? 0) - (a.stock ?? 0));

  // render
  renderTable(list);
}

// Render Tabler
function renderTable(list) {
  const tbody = document.getElementById("productTableBody");
  if (!tbody) return;

  const now = new Date();
  now.setHours(0, 0, 0, 0); // Normalize time for accurate daily comparison

  tbody.innerHTML = list.map(p => {
    // 1. Calculations & Type Safety
    const price = (typeof p.price === 'number') ? p.price : 0;
    const stock = (typeof p.stock === 'number') ? p.stock : 0;
    const isUtensils = (p.category === "utensil");
    
    // Utensils: 1 stock = 100 pieces. Total Value = Price * Stock.
    const pieces = isUtensils ? (stock * 100) : 0;
    const totalValue = (price * stock).toFixed(2);

    // Dynamic Display for KG/Unit Column
    // Per your request: "In utensils i want you to remove the kg part"
    const quantityDisplay = isUtensils ? "—" : (p.quantity ? `${p.quantity} ${p.unit}` : "—");

    // 2. Expiry & Countdown Logic
let expiryHTML = '—';
    if (p.category === 'ingredient' && p.expiry && p.expiry !== "N/A") {
      // 1. Get "Now" but set time to midnight to compare only dates
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // 2. Parse the expiry date and set its time to midnight
      const expDate = new Date(p.expiry);
      expDate.setHours(0, 0, 0, 0);

      // 3. Calculate the difference in milliseconds, then convert to days
      const diffTime = expDate.getTime() - today.getTime();
      const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

      let badgeClass = "bg-info text-dark"; 
      let countdownText = `${diffDays} days left`;

      // 4. Threshold Logic
      if (diffDays < 0) {
        badgeClass = "bg-danger"; // 🔥 RED
        countdownText = "EXPIRED";
      } else if (diffDays === 0) {
        badgeClass = "bg-danger"; // 🔥 RED (Expires today)
        countdownText = "EXPIRES TODAY";
      } else if (diffDays <= 7) {
        badgeClass = "bg-warning text-dark"; // ⚠️ YELLOW
        countdownText = "Expiring Soon!";
      }

      expiryHTML = `
        <span class="badge ${badgeClass}">${p.expiry}</span>
        <div style="font-size: 0.75rem; margin-top: 2px;" class="fw-bold text-uppercase">
          ${countdownText}
        </div>
      `;
    }
    // 3. Return Table Row
    return `
      <tr>
        <td>${p.sku ?? ''}</td>
        <td>${p.name ?? ''}</td>
        <td class="${stockColor(stock)} text-center fw-bold">${stock}</td>
        <td>${isUtensils ? `${pieces.toLocaleString()} pcs` : `—`}</td>
        <td>₱${price.toFixed(2)}</td>
        <td>${quantityDisplay}</td>
        <td>₱${Number(totalValue).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
        <td>${expiryHTML}</td>
        <td>
          <div class="d-flex gap-1">
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown">
                Adjust
              </button>
              <ul class="dropdown-menu p-2" style="min-width: 180px;">
                <li class="fw-bold px-2 small">Quick Adjust (KG/Units)</li>
                <li class="d-flex justify-content-between px-2 my-1 gap-1">
                  <button class="btn btn-xs btn-danger" onclick="applyAdjust('${p.id}', -3)">-3</button>
                  <button class="btn btn-xs btn-danger" onclick="applyAdjust('${p.id}', -2)">-2</button>
                  <button class="btn btn-xs btn-danger" onclick="applyAdjust('${p.id}', -1)">-1</button>
                  <button class="btn btn-xs btn-success" onclick="applyAdjust('${p.id}', 1)">+1</button>
                  <button class="btn btn-xs btn-success" onclick="applyAdjust('${p.id}', 2)">+2</button>
                  <button class="btn btn-xs btn-success" onclick="applyAdjust('${p.id}', 3)">+3</button>
                </li>
                <li class="fw-bold px-2 mt-2 small">Custom (Grams)</li>
                <li class="px-2">
                  <input type="number" id="custom-${p.id}" class="form-control form-control-sm mb-2" placeholder="e.g. 300 or -300">
                  <button class="btn btn-sm btn-primary w-100" 
                    onclick="applyAdjust('${p.id}', document.getElementById('custom-${p.id}').value, true)">
                    Apply
                  </button>
                </li>
              </ul>
            </div>
            <button class="btn btn-sm btn-outline-primary" onclick="editProduct('${p.id}')">Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${p.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");
}

/**
 * 1. REAL-TIME CHART (Weekly/Monthly/Yearly)
 */
function startRealtimeChart(range) {
  const now = new Date();
  let startDate = new Date();

  if (range === "weekly") {
    // Look back 4 weeks
    startDate.setDate(now.getDate() - 28);
  } else if (range === "monthly") {
    // Start from beginning of current year to show all months
    startDate.setMonth(0, 1);
  } else if (range === "yearly") {
    // Look back 5 years
    startDate.setFullYear(now.getFullYear() - 5);
  }
  startDate.setHours(0, 0, 0, 0);

  const q = query(
    collection(db, "transactions"),
    where("timestamp", ">=", startDate)
  );

  const unsubscribe = onSnapshot(q, snapshot => {
    let groupedData = {};

    snapshot.forEach(doc => {
      const data = doc.data();
      const date = data.timestamp?.toDate();
      if (!date) return;

      let key = "";
      
      if (range === "weekly") {
        // Formats as "Week of [Date]"
        const startOfWeek = new Date(date);
        startOfWeek.setDate(date.getDate() - date.getDay());
        key = "Week " + startOfWeek.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      } 
      else if (range === "monthly") {
        // Formats as "January", "February", etc.
        key = date.toLocaleDateString("en-US", { month: "long" });
      } 
      else if (range === "yearly") {
        // Formats as "2025", "2026", etc.
        key = date.getFullYear().toString();
      }

      if (!groupedData[key]) groupedData[key] = 0;
      groupedData[key] += Math.abs(Number(data.change)) || 0;
    });

    // Sort keys logically (optional but recommended for years/months)
    const sortedLabels = Object.keys(groupedData);
    const sortedValues = sortedLabels.map(label => groupedData[label]);

    renderChart(sortedLabels, sortedValues, range.toUpperCase() + " MOVEMENT");
  });

  activeListeners.push(unsubscribe);
}

/**
 * 2. PRODUCT MOVEMENT (TOTAL)
 */
function loadProductMovement() {
  const q = query(collection(db, "transactions"));

  const unsubscribe = onSnapshot(q, snapshot => {
    let grouped = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (!grouped[d.productName]) grouped[d.productName] = 0;
      grouped[d.productName] += Number(d.change) || 0;
    });

    renderChart(Object.keys(grouped), Object.values(grouped), "Product Movement");
  });

  activeListeners.push(unsubscribe);
}

/**
 * 3. REVENUE & STAT CARDS
 */
function loadRevenueAnalytics() {
  const q = query(collection(db, "transactions"));

  const unsubscribe = onSnapshot(q, snapshot => {
    let sales = 0;           // Total value of stock used/sold (negative change)
    let purchases = 0;       // Total value of stock bought (positive change)
    let totalMovement = 0;
    let productTotals = {};

    snapshot.forEach(doc => {
      const d = doc.data();
      const changeVal = Number(d.change) || 0;
      const totalVal = Number(d.totalValue) || 0;

      // Logic for Sales vs. Purchases
      if (changeVal < 0) {
        // Stock going OUT (Usage/Sales)
        sales += Math.abs(totalVal);
      } else if (changeVal > 0) {
        // Stock coming IN (Bought/Restocked)
        purchases += Math.abs(totalVal);
      }

      // Movement: Total absolute volume of activity
      totalMovement += Math.abs(changeVal);

      // Tracking Top Product by total activity
      if (d.productName) {
        productTotals[d.productName] = (productTotals[d.productName] || 0) + Math.abs(changeVal);
      }
    });

    // Update UI Elements
    // Note: Make sure you have an element with id="expenseCard" in your HTML
    document.getElementById("revenueCard").innerText = "₱" + sales.toLocaleString(undefined, { minimumFractionDigits: 2 });
    
    const expenseEl = document.getElementById("expenseCard");
    if (expenseEl) {
      expenseEl.innerText = "₱" + purchases.toLocaleString(undefined, { minimumFractionDigits: 2 });
    }

    document.getElementById("movementCard").innerText = totalMovement.toFixed(2) + " KG";

    const productKeys = Object.keys(productTotals);
    const top = productKeys.sort((a, b) => productTotals[b] - productTotals[a])[0];
    document.getElementById("topProductCard").innerText = top || "-";
  });

  activeListeners.push(unsubscribe);
}
/**
 * 4. INGREDIENT USAGE
 */
function loadMostUsedIngredients() {
  const q = query(
    collection(db, "transactions"),
    where("category", "==", "ingredient")
  );

  const unsubscribe = onSnapshot(q, snapshot => {
    let usage = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.change < 0) {
        if (!usage[d.productName]) usage[d.productName] = 0;
        usage[d.productName] += Math.abs(Number(d.change));
      }
    });

    renderChart(Object.keys(usage), Object.values(usage), "Most Used Ingredients");
  });

  activeListeners.push(unsubscribe);
}

// Export XLSX
window.exportXLSX = function () {

    let previousData = JSON.parse(localStorage.getItem("previous_inventory") || "{}");

    let sheetData = [
        [
            "SKU", "Name", "Description", "Category", "Quantity", "Unit", "Quantity_Value",
            "Price", "Old Stock", "New Stock", "Stock Change", "Total Value", "Pieces"
        ]
    ];

    products.forEach(p => {

        let newStock = Number(p.stock);
        let oldStock = previousData[p.sku]?.stock;

        let changeText = "— NEW ITEM";
        let diffValue = 0;

        if (typeof oldStock === "number") {
            diffValue = newStock - oldStock;

            if (diffValue > 0) {
                changeText = `+${diffValue} ↑ INCREASE`;
            } else if (diffValue < 0) {
                changeText = `${diffValue} ↓ DECREASE`;
            } else {
                changeText = `0 — NO CHANGE`;
            }
        }

        const pieces =
            p.category?.toLowerCase() === "utensil"
                ? newStock * 100
                : "";

        let totalValue = newStock * Number(p.price || 0);

        sheetData.push([
            p.sku,
            p.name,
            p.description,
            p.category,
            p.quantity || "",
            p.unit || "",
            p.quantity_value || "",
            p.price || 0,
            typeof oldStock === "number" ? oldStock : "",
            newStock,
            changeText, // ⭐ CLEAR INDICATOR
            totalValue,
            pieces
        ]);
    });

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(sheetData);

    XLSX.utils.book_append_sheet(wb, ws, "Inventory");

    const today = new Date().toISOString().split("T")[0];
    XLSX.writeFile(wb, `inventory (${today}).xlsx`);

    // Save snapshot
    let snapshot = {};
    products.forEach(p => {
        snapshot[p.sku] = { stock: Number(p.stock) };
    });
    localStorage.setItem("previous_inventory", JSON.stringify(snapshot));
};
