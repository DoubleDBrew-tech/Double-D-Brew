  <style>
/* ✨ MANGO THEME UI */
body {
  background: #fff8e1; /* light mango cream */
  font-family: "Poppins", sans-serif;
}

/* LOGIN SECTION WITH FLOATING MANGO ANIMATION */
#loginForm {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #ffcc4d, #fff3c4),
              url('https://images.unsplash.com/photo-1611078486246-3bb14edc8c7b?auto=format&fit=crop&w=800&q=80') no-repeat center center;
  background-size: cover;
}

#loginForm::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 204, 77, 0.3); /* translucent mango overlay */
  z-index: 1;
}

#loginForm .mango-slice {
  position: absolute;
  width: 60px;
  height: 60px;
  background: url('https://images.emojiterra.com/google/noto-emoji/unicode-15/color/512px/1f96d.png') no-repeat center center;
  background-size: contain;
  animation: floatMango 10s linear infinite;
  opacity: 0.8;
}

#loginForm .mango-slice:nth-child(1) { left: 10%; animation-duration: 12s; }
#loginForm .mango-slice:nth-child(2) { left: 30%; animation-duration: 10s; animation-delay: 2s; }
#loginForm .mango-slice:nth-child(3) { left: 50%; animation-duration: 14s; animation-delay: 1s; }
#loginForm .mango-slice:nth-child(4) { left: 70%; animation-duration: 11s; animation-delay: 3s; }
#loginForm .mango-slice:nth-child(5) { left: 90%; animation-duration: 13s; animation-delay: 0s; }

@keyframes floatMango {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  50% { transform: translateY(50vh) rotate(180deg); opacity: 0.9; }
  100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}

.login-box {
  position: relative;
  z-index: 2;
  background: rgba(255, 255, 248, 0.95);
  padding: 35px;
  border-radius: 18px;
  border: 2px solid #f7b731;
  box-shadow: 0 6px 18px rgba(255, 179, 0, 0.25);
  text-align: center;
  min-width: 350px;
}

.login-box h2 {
  font-weight: 700;
  color: #d68b00;
}

/* NAVBAR */
.navbar {
  background: #f4a300 !important; /* ripe mango orange */
  border-bottom: 3px solid #ffd36b;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.navbar-brand {
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff8e1 !important;
}

/* BUTTONS */
.btn-primary {
  background: #ffb300 !important;
  border: none;
}
.btn-primary:hover {
  background: #e79d00 !important;
}

.btn-warning {
  background: #ffc947 !important;
  border: none;
}
.btn-warning:hover {
  background: #f7b600 !important;
}

.btn-secondary {
  background: #ffe08a !important;
  color: #7a5200 !important;
  border: none;
}
.btn-secondary:hover {
  background: #ffd369 !important;
}

/* DASHBOARD CARDS */
.card {
  background: #fffbe7;
  border: 1px solid #ffc447;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(255, 179, 0, 0.15);
}

/* TABLE */
.table-dark {
  background: #ffb300 !important;
  border-color: #ffb300 !important;
}

.table-striped tbody tr:nth-child(odd) { background: #fff7d1; }
.table-striped tbody tr:nth-child(even) { background: #fff2bd; }
.table-striped tbody tr:hover { background: #fff0a3; }
 
body #app {
  background: #fff8e1;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

#app .mango-slice {
  position: absolute;
  width: 50px;
  height: 50px;
  background: url('https://images.emojiterra.com/google/noto-emoji/unicode-15/color/512px/1f96d.png') no-repeat center center;
  background-size: contain;
  animation: floatMangoDashboard 15s linear infinite;
  opacity: 0.6;
}

#app .mango-slice:nth-child(1) { left: 5%; animation-delay: 0s; }
#app .mango-slice:nth-child(2) { left: 25%; animation-delay: 3s; }
#app .mango-slice:nth-child(3) { left: 50%; animation-delay: 1s; }
#app .mango-slice:nth-child(4) { left: 70%; animation-delay: 4s; }
#app .mango-slice:nth-child(5) { left: 90%; animation-delay: 2s; }

@keyframes floatMangoDashboard {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  50% { transform: translateY(50vh) rotate(180deg); opacity: 0.8; }
  100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}

/* 🍿 WATCH PARTY CINEMATIC ENGINE */
#watchPartyDashboard {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 9999; background: #0b0c10;
  color: #fff; font-family: 'Poppins', sans-serif;
}
.wp-hidden { display: none !important; }
.wp-hidden-stage { opacity: 0; pointer-events: none; transform: scale(0.95); }

/* Stage 1 Presentation Wrapper */
.wp-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2; transition: opacity 0.8s ease;
}
.wp-bg-blur {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: brightness(0.5) contrast(1.1);
  z-index: -1;
}
.wp-gate-content {
  position: relative; text-align: center; z-index: 3;
  background: rgba(11, 12, 16, 0.65);
  padding: 40px; border-radius: 20px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 75, 110, 0.3);
}
.wp-greeting {
  font-size: 3.5rem; font-weight: 700; color: #fff;
  text-shadow: 0px 4px 15px rgba(255, 75, 110, 0.6);
  margin-bottom: 2rem; animation: heartbeat 2.5s infinite alternate;
}
.wp-btn-enter {
  background: linear-gradient(45deg, #ff4b6e, #ff758c);
  border: none; padding: 12px 35px; border-radius: 50px;
  color: white; font-size: 1.1rem; cursor: pointer; font-weight: 600;
  box-shadow: 0 5px 15px rgba(255, 75, 110, 0.4);
  transition: all 0.3s ease;
}
.wp-btn-enter:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 75, 110, 0.6); }

/* Stage 2 Content Theater Layout */
.wp-content-panel {
  position: absolute; inset: 0; padding: 30px;
  display: flex; flex-direction: column; overflow-y: auto;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  background: #0b0c10;
}
.wp-header {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;
}
.wp-player-container {
  position: relative; width: 100%; max-width: 900px;
  margin: 20px auto; background: #000; border-radius: 12px; overflow: hidden;
  border: 2px solid #ff4b6e;
}
#wpSharedPlayer { width: 100%; display: block; aspect-ratio: 16/9; }
.sync-badge {
  position: absolute; top: 15px; left: 15px; background: rgba(40, 167, 69, 0.85);
  padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
  border: 1px solid #fff;
}
.wp-movie-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px; max-width: 900px; margin: 0 auto; width: 100%; padding-top: 10px;
}
.movie-card {
  background: #1f2833; border: 1px solid #ff4b6e; border-radius: 8px;
  padding: 20px; cursor: pointer; text-align: center; transition: all 0.2s;
}
.movie-card:hover { background: #ff4b6e; color: #fff; font-weight: bold; transform: translateY(-2px); }
.wp-btn-close {

}
.wp-btn-close:hover { background: #444; }

@keyframes heartbeat {
  0% { transform: scale(1); }
  100% { transform: scale(1.03); }
}

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, increment, query, where, onSnapshot, orderBy
} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1smwaGZUVzAO1JXjcV7hkSNdf0eRVB0w",
  authDomain: "doubledbrew-569cd.firebaseapp.com",
  projectId: "doubledbrew-569cd",
  storageBucket: "doubledbrew-569cd.firebasestorage.app",
  messagingSenderId: "28995576921",
  appId: "1:28995576921:web:597ac212cce2eb7066fd48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let products = [];
let currentCategory = "all"; 
let sortMode = ""; 
let searchQuery = ""; 

window.login = function () {
  const email = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  if (email === "admin" && password === "mango") {
    localStorage.setItem("loggedIn", "true");
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("welcomePage").style.display = "block";
    setTimeout(() => { goToDashboard(); }, 10000);
  } else {
    alert("❌ Invalid username or password!");
  }
};

window.logout = function () {
  localStorage.removeItem("loggedIn");
  document.getElementById("app").style.display = "none";
  document.getElementById("loginForm").style.display = "flex";
};

window.goToDashboard = function () {
  document.getElementById("welcomePage").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadProducts();
};

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  products = [];
  querySnapshot.forEach((docu) => { products.push({ id: docu.id, ...docu.data() }); });
  showDashboard();
}

window.addProduct = function () {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById("main").innerHTML = `
    <h3>Add New Product</h3>
    <form id="addForm">
      <label class="small fw-bold">SKU (Base):</label>
      <input class="form-control mb-2" name="sku" placeholder="e.g. COFFEE-01" required>
      <label class="small fw-bold">Name:</label>
      <input class="form-control mb-2" name="name" placeholder="Name" required>
      <label class="small fw-bold">Description:</label>
      <input class="form-control mb-2" name="description" placeholder="Description">
      <label class="small fw-bold">Category:</label>
      <select class="form-control mb-2" name="category" id="addCategory" onchange="toggleAddFields()" required>
        <option value="ingredient">Ingredient</option>
        <option value="utensil">Utensil</option>
      </select>
      <div id="ingredientFields">
        <div class="p-2 border rounded mb-2 bg-light">
          <label class="small fw-bold text-primary">Expiration Date:</label>
          <input type="date" class="form-control form-control-sm" name="expiryDate" min="${today}" required>
        </div>
        <label class="small fw-bold">Starting Quantity:</label>
        <div class="input-group mb-2">
          <input class="form-control" name="quantity" type="number" step="0.01" min="0" placeholder="e.g. 1.5">
          <select class="form-select" name="unit"><option value="kg">kg</option><option value="g">grams</option></select>
        </div>
      </div>
      <div id="utensilFields" style="display:none;">
        <div class="p-2 border rounded mb-2 bg-light text-center">
          <label class="small fw-bold d-block">Utensil Stocking</label>
          <input class="form-control" name="pieces" type="number" min="0" placeholder="Number of Pieces">
        </div>
      </div>
      <label class="small fw-bold" id="priceLabelText">Price (Per KG):</label>
      <input class="form-control mb-2" name="price" id="priceInput" placeholder="0.00" type="number" step="0.01" min="0" required>
      <div class="mt-3">
        <button class="btn btn-primary">Save Product</button>
        <button type="button" class="btn btn-secondary ms-2" onclick="showDashboard()">Cancel</button>
      </div>
    </form>
  `;
  window.toggleAddFields = function() {
    const cat = document.getElementById("addCategory").value;
    const isIng = (cat === "ingredient");
    document.getElementById("ingredientFields").style.display = isIng ? "block" : "none";
    document.getElementById("utensilFields").style.display = isIng ? "none" : "block";
    document.getElementById("priceLabelText").innerText = isIng ? "Price (Per KG):" : "Price (Per Piece):";
  };
  document.getElementById("addForm").addEventListener("submit", saveNewProduct);
};

async function saveNewProduct(e) {
  e.preventDefault();
  const form = e.target;
  const newSku = form.sku.value.trim();
  if (products.some(p => p.sku.toLowerCase() === newSku.toLowerCase())) return alert("❌ SKU already exists.");
  
  let finalStock = 0, finalQty = parseFloat(form.quantity.value) || 0, finalUnit = form.unit.value;
  if (form.category.value === "utensil") {
    finalStock = (parseFloat(form.pieces.value) || 0) / 100;
    finalQty = parseFloat(form.pieces.value) || 0;
    finalUnit = "pcs";
  } else {
    finalStock = finalUnit === "g" ? finalQty / 1000 : finalQty;
  }

  await addDoc(collection(db, "products"), {
    sku: newSku, name: form.name.value, description: form.description.value,
    category: form.category.value, quantity: finalQty, unit: finalUnit,
    stock: finalStock, price: parseFloat(form.price.value), expiry: form.expiryDate?.value || "N/A"
  });
  showDashboard(); loadProducts();
}

window.applyAdjust = async function (id, value, isCustom = false) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  let adjustAmount = parseFloat(value);
  if (isNaN(adjustAmount)) return alert("❌ Invalid Input");
  
  let adjustKg = p.category === "utensil" ? adjustAmount / 100 : (isCustom ? adjustAmount / 1000 : adjustAmount);
  let newStock = parseFloat(((p.stock || 0) + adjustKg).toFixed(3));
  if (newStock < 0) return alert("❌ Stock cannot be lower than 0!");

  await updateDoc(doc(db, "products", id), {
    stock: newStock,
    quantity: p.category === "utensil" ? Math.round(newStock * 100) : (newStock < 1 ? Math.round(newStock * 1000) : newStock),
    unit: p.category === "utensil" ? "pcs" : (newStock < 1 ? "g" : "kg")
  });
  loadProducts();
};

function applyFiltersAndRender() {
  let list = currentCategory === 'all' ? [...products] : products.filter(p => p.category === currentCategory);
  if (sortMode === "az") list.sort((a,b) => a.name.localeCompare(b.name));
  renderTable(list);
}

function renderTable(list) {
  const tbody = document.getElementById("productTableBody");
  if (!tbody) return;
  tbody.innerHTML = list.map(p => `
    <tr>
      <td>${p.sku}</td>
      <td>${p.name}</td>
      <td>${p.stock.toFixed(2)}</td>
      <td>${p.category === 'utensil' ? Math.round(p.stock*100) : '—'}</td>
      <td>₱${p.price}</td>
      <td>${p.category === 'utensil' ? '—' : p.quantity + ' ' + p.unit}</td>
      <td>₱${(p.stock * p.price).toFixed(2)}</td>
      <td><span class="badge bg-secondary">${p.expiry || 'N/A'}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-success" onclick="applyAdjust('${p.id}', prompt('Amount:'), false)">Adjust</button>
      </td>
    </tr>
  `).join("");
}

window.showDashboard = function () {
  document.getElementById("main").innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Inventory Controls</h4>
        <div>
            <button class="btn btn-primary" onclick="addProduct()">➕ Add Product</button>
            <button class="btn btn-danger" onclick="openWatchParty()">🍿 Watch Party</button>
        </div>
    </div>
    <table class="table table-striped border">
        <thead class="table-dark">
            <tr><th>SKU</th><th>Name</th><th>Stock</th><th>Pieces</th><th>Price</th><th>KG Info</th><th>Total Value</th><th>Expiry</th><th>Actions</th></tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>
  `;
  renderTable(products);
};

// 🍿 WATCH PARTY LOGIC CONTROLLER (WITH EVENT LOOP SYNC)
const wpDashboard = document.getElementById('watchPartyDashboard');
const wpWelcomeGate = document.getElementById('wpWelcomeGate');
const wpTheaterPanel = document.getElementById('wpTheaterPanel');
const wpPlayer = document.getElementById('wpSharedPlayer');
const movieGrid = document.getElementById('movieUploadList');
const syncIndicator = document.getElementById('syncIndicator');

let isBroadcastingSync = false;

window.openWatchParty = function() {
  wpDashboard.classList.remove('wp-hidden');
  wpWelcomeGate.style.opacity = '1';
  wpWelcomeGate.style.pointerEvents = 'auto';
  wpTheaterPanel.classList.add('wp-hidden-stage');
};

document.getElementById('btnEnterTheater').addEventListener('click', () => {
  wpWelcomeGate.style.opacity = '0';
  wpWelcomeGate.style.pointerEvents = 'none';
  setTimeout(() => {
    wpTheaterPanel.classList.remove('wp-hidden-stage');
    loadSharedMovies();
    setupStreamingSyncListeners();
  }, 400);
});

document.getElementById('btnCloseParty').addEventListener('click', () => {
  if (wpPlayer) wpPlayer.pause();
  wpDashboard.classList.add('wp-hidden');
});

// Sync Pipeline Engine (Keeps timelines aligned across rooms)
function setupStreamingSyncListeners() {
  if (!wpPlayer) return;

  // Track playback status updates locally
  wpPlayer.addEventListener('play', () => {
    if (isBroadcastingSync) return;
    broadcastPlaybackEvent("PLAY", wpPlayer.currentTime);
  });

  wpPlayer.addEventListener('pause', () => {
    if (isBroadcastingSync) return;
    broadcastPlaybackEvent("PAUSE", wpPlayer.currentTime);
  });

  wpPlayer.addEventListener('seeked', () => {
    if (isBroadcastingSync) return;
    broadcastPlaybackEvent("SEEK", wpPlayer.currentTime);
  });

  // Intercept loop updates to reconcile time drifts
  setInterval(() => {
    if (!wpPlayer.paused && !isBroadcastingSync) {
      // Keep checking sync channel loop positions periodically
      syncIndicator.innerText = "🟢 Live Sync Active (" + Math.floor(wpPlayer.currentTime) + "s)";
    }
  }, 1000);
}

function broadcastPlaybackEvent(action, timestamp) {
  isBroadcastingSync = true;
  console.log(`[Sync Channel Outgoing]: ${action} sent at timestamp timeline index: ${timestamp}`);
  
  // Simulated socket receipt loop confirmation
  setTimeout(() => { isBroadcastingSync = false; }, 300);
}

function loadSharedMovies() {
  const sharedMoviesCollection = [
    { id: "1", title: "Our First Movie Night", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
    { id: "2", title: "Leigh's Favorite Film", url: "https://www.w3schools.com/html/movie.mp4" }
  ];

  movieGrid.innerHTML = '';
  sharedMoviesCollection.forEach(movie => {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.innerHTML = `<h4>🎥 ${movie.title}</h4>`;
    card.addEventListener('click', () => {
      wpPlayer.src = movie.url;
      wpPlayer.load();
      wpPlayer.play();
    });
    movieGrid.appendChild(card);
  });
}

if (localStorage.getItem("loggedIn") === "true") {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadProducts();
}
